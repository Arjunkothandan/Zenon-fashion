{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Login - Zenon</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>

.login-container{
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    background:white;
    padding:40px;
    width:350px;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    text-align:center;
}

.login-card h2{
    margin-bottom:25px;
    color:#1a2a6c;
}

.login-card input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

.login-btn{
    width:100%;
    padding:12px;
    background:linear-gradient(135deg,#ff9900,#ff6600);
    border:none;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    transform:scale(1.03);
    box-shadow:0 8px 15px rgba(0,0,0,0.2);
}

.signup-link{
    margin-top:15px;
    font-size:14px;
}

.signup-link a{
    color:#ff6600;
    text-decoration:none;
    font-weight:600;
}

.error{
    color:red;
    margin-bottom:10px;
}

</style>

</head>

<body>

{% include 'navbar.html' %}

<div class="login-container">

<div class="login-card">

<h2>Login to Zenon</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button class="login-btn" type="submit">Login</button>

</form>

<div class="signup-link">
Don't have an account?
<a href="/accounts/signup/">Create Account</a>
</div>

</div>

</div>

</body>
</html>
